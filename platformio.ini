[platformio]
src_dir = .

[env:xiao_esp32s3]
platform = espressif32@^6.3.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

build_src_filter = +<main.cpp>

board_build.arduino.memory_type = qio_opi
board_build.partitions = partitions.csv
board_build.filesystem = spiffs

[env:heltec_wifi_lora_32_v4]
; Heltec WiFi LoRa 32 V4, ESP32-S3R2 variant (2MB PSRAM in quad mode, 16MB
; flash). No dedicated PlatformIO board entry exists for this board yet, so
; this starts from the generic ESP32-S3 devkit board and overrides the
; flash/PSRAM parameters to match. GNSS and LoRa peripherals are left
; unpowered — this env only wires up the onboard SSD1306 OLED.
platform = espressif32@^6.3.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBOARD_HELTEC_V4
    -DUSE_HELTEC_OLED

build_src_filter = +<main.cpp> +<display_heltec.cpp>

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit BusIO@^1.16.1

board_build.arduino.memory_type = qio_qspi
board_build.partitions = partitions.csv
board_build.filesystem = spiffs
board_upload.flash_size = 16MB
board_build.flash_mode = qio
